name: Release

# Build the Windows + Linux desktop bundles on tag push and attach them to the
# GitHub Release — which is what the download buttons on mattssoftware.com
# resolve. macOS is built + notarized locally with `make` (same split as Libre:
# Mac signing is easiest with the Developer ID cert in the local keychain), so
# CI covers only the platforms that can't be built on the Mac.
#
# The @mattmattmattmatt/base "file:../../Libs/base" dependency is materialized
# from the sibling InfamousVague/base repo before `npm ci`, mirroring Libre.
#
# Trigger: push a tag like v0.1.0  →  builds Windows + Linux, uploads to the
#          release named after the tag (the macOS .dmg from `make` already
#          lives there).  workflow_dispatch → ad-hoc build (artifacts on the run).
#
# To also build macOS in CI: add a `macos-latest` matrix entry with
# `args: --target universal-apple-darwin`, set the APPLE_* repo secrets
# (certificate base64, identity, Apple ID, app password, team id), and pass
# them to tauri-action's env — but the local `make` flow is the supported path.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: Linux (x64)
            args: "--bundles appimage,deb,rpm"
          - os: windows-latest
            label: Windows (x64)
            args: ""

    steps:
      - uses: actions/checkout@v4

      # Materialize the @mattmattmattmatt/base "file:../../Libs/base" dependency
      # by checking out the sibling repo and copying it to the path package.json
      # expects. Copy (not symlink) so Windows runners don't need admin rights.
      - name: Check out @mattmattmattmatt/base
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
      - name: Wire _base into ../../Libs/base
        shell: bash
        run: |
          mkdir -p ../../Libs
          cp -R _base ../../Libs/base
          test -d ../../Libs/base/primitives || { echo "Libs/base/primitives missing"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('The Black Pearl {0}', github.ref_name) || '' }}
          releaseBody: "Desktop builds for macOS, Windows, and Linux."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
