name: Release

# Build + publish "The Black Pearl" for macOS, Windows, and Linux, and attach
# the bundles to a GitHub Release — which is what the download buttons on
# mattssoftware.com resolve. Mirrors Libre's desktop-build.yml: native runner
# per OS (cross-compiling Tauri from one host is flaky), and the
# @mattmattmattmatt/base "file:" dependency is materialized from the sibling
# InfamousVague/base repo before `npm ci`.
#
# Trigger: push a tag like v0.1.0  →  builds all three, creates the release.
#          workflow_dispatch       →  ad-hoc build, artifacts on the run only.
#
# macOS signing + notarization needs these repo secrets (Settings → Secrets →
# Actions). Without them the Windows/Linux jobs still succeed; only the macOS
# job needs them (or remove the macos matrix entry and keep building Mac locally
# with `make`):
#   APPLE_CERTIFICATE           base64 of the Developer ID .p12
#                               (export: `security export` to .p12, then
#                                `base64 -i cert.p12 | pbcopy`)
#   APPLE_CERTIFICATE_PASSWORD  the .p12 export password
#   APPLE_SIGNING_IDENTITY      "Developer ID Application: Matt Wisniewski (F6ZAL7ANAD)"
#   APPLE_ID                    Apple ID email
#   APPLE_PASSWORD              app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID               F6ZAL7ANAD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Universal)
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - os: ubuntu-22.04
            label: Linux (x64)
            args: "--bundles appimage,deb,rpm"
            rust-targets: ""
          - os: windows-latest
            label: Windows (x64)
            args: ""
            rust-targets: ""

    steps:
      - uses: actions/checkout@v4

      # Materialize the @mattmattmattmatt/base "file:../../Libs/base" dependency
      # by checking out the sibling repo and copying it to the path package.json
      # expects. Copy (not symlink) so Windows runners don't need admin rights.
      - name: Check out @mattmattmattmatt/base
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
      - name: Wire _base into ../../Libs/base
        shell: bash
        run: |
          mkdir -p ../../Libs
          cp -R _base ../../Libs/base
          test -d ../../Libs/base/primitives || { echo "Libs/base/primitives missing"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build, sign, notarize & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (used only on the macOS runner;
          # ignored elsewhere). Empty on Windows/Linux → those just build.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('The Black Pearl {0}', github.ref_name) || '' }}
          releaseBody: "Signed & notarized desktop builds for macOS, Windows, and Linux."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
